version: '3.8'
services:
  sentinel:
    build: .
    ports:
      - "8000:8000"
      - "7860:7860"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./:/app
    env_file:
      - .env
    command: bash -c "python3 -m app & uvicorn api.main:app --host 0.0.0.0 --port 8000"
